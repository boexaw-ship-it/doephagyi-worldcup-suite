<!doctype html>
<html lang="my">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup Prediction Suite</title>
  <style>
    :root {
      --bg: #0c1117;
      --panel: #121a23;
      --panel-2: #182332;
      --line: #2b394a;
      --text: #f3f7fb;
      --muted: #a9b6c7;
      --accent: #2ecb70;
      --gold: #f4bf45;
      --red: #ef5555;
      --blue: #4f8cff;
      --shadow: 0 18px 55px rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 140, 255, .22), transparent 32rem),
        linear-gradient(135deg, #071019 0%, var(--bg) 48%, #10151d 100%);
      font-family: Arial, "Noto Sans Myanmar", "Myanmar Text", sans-serif;
      min-height: 100vh;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 32px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .ball {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background:
        linear-gradient(45deg, transparent 42%, #111 43% 57%, transparent 58%),
        linear-gradient(-45deg, transparent 42%, #111 43% 57%, transparent 58%),
        #f7f7f7;
      border: 3px solid var(--accent);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      line-height: 1.1;
    }

    .subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: .95rem;
    }

    .pill {
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      white-space: nowrap;
      background: rgba(255, 255, 255, .04);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(118px, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease, background .14s ease;
    }

    button:hover { transform: translateY(-1px); border-color: var(--accent); }
    button.active { background: var(--accent); color: #06110b; border-color: var(--accent); }

    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      align-items: start;
      margin-top: 14px;
    }

    .frame {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 26, 35, .92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      position: relative;
      min-height: 320px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 18px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, .08), rgba(0, 0, 0, .76)),
        var(--photo, linear-gradient(135deg, #1d2a3a, #101821));
      background-size: cover;
      background-position: center;
    }

    .team {
      display: grid;
      gap: 10px;
      align-content: end;
      min-width: 0;
    }

    .team.away { text-align: right; justify-items: end; }

    .crest {
      width: 76px;
      height: 86px;
      border: 3px solid rgba(255,255,255,.75);
      border-radius: 10px 10px 18px 18px;
      background: var(--jersey);
      box-shadow: inset 0 -18px 0 rgba(0,0,0,.16);
    }

    .team-name {
      font-size: clamp(2rem, 6vw, 4.7rem);
      font-weight: 900;
      line-height: .9;
      overflow-wrap: anywhere;
      text-transform: uppercase;
      text-shadow: 0 3px 14px rgba(0,0,0,.72);
    }

    .versus {
      align-self: center;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #08120c;
      background: var(--gold);
      font-weight: 900;
      font-size: 1.45rem;
      border: 4px solid rgba(255,255,255,.86);
      box-shadow: 0 12px 30px rgba(0,0,0,.34);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.03);
    }

    .meta-row span {
      padding: 7px 10px;
      border-radius: 999px;
      background: #0d141d;
      color: var(--muted);
      border: 1px solid var(--line);
      font-size: .9rem;
    }

    .card-tabs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .card-tabs button {
      text-align: left;
      padding: 10px 12px;
    }

    .content {
      padding: 18px;
      min-height: 238px;
    }

    .content h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 14px;
      min-height: 104px;
    }

    .box strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .formation {
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 10px;
    }

    .mini-shirt {
      width: 42px;
      height: 48px;
      border-radius: 7px 7px 13px 13px;
      background: var(--jersey);
      border: 2px solid rgba(255,255,255,.65);
    }

    .odds {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .odd {
      border-radius: 8px;
      padding: 16px 10px;
      text-align: center;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .odd b {
      display: block;
      margin-top: 6px;
      font-size: 2rem;
      color: var(--gold);
    }

    ul {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 9px;
      color: var(--text);
    }

    .friends {
      font-size: 1.35rem;
      line-height: 1.65;
      color: #e8f1ff;
    }

    .error {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid var(--red);
      border-radius: 8px;
      background: rgba(239, 85, 85, .12);
      color: #ffd7d7;
    }

    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      .tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stage { grid-template-columns: 1fr; }
      .card-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero { grid-template-columns: 1fr; min-height: 430px; align-items: center; }
      .team.away { text-align: left; justify-items: start; }
      .versus { justify-self: start; }
      .two-col, .odds { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="ball" aria-hidden="true"></div>
        <div>
          <h1 id="brand">Prediction Suite</h1>
          <div class="subline">5 fixtures, 5 prediction cards, manual JSON control</div>
        </div>
      </div>
      <div class="pill">YouTube ready layout</div>
    </header>

    <nav id="fixtureTabs" class="tabs" aria-label="Fixture tabs"></nav>

    <section class="stage">
      <div class="frame">
        <article id="matchHero" class="hero"></article>
        <div id="matchMeta" class="meta-row"></div>
        <div id="cardContent" class="content"></div>
      </div>

      <aside class="frame content">
        <h2>Prediction Tabs</h2>
        <nav id="cardTabs" class="card-tabs" aria-label="Prediction card tabs"></nav>
      </aside>
    </section>
  </main>

  <script>
    const cardTypes = [
      { id: "matchup", label: "Card 1: VS Photo" },
      { id: "formation", label: "Card 2: Formation" },
      { id: "winner", label: "Card 3: 1X2" },
      { id: "goals", label: "Card 4: Goal Tips" },
      { id: "friends", label: "Card 5: Friends View" }
    ];

    let data = null;
    let activeMatch = 0;
    let activeCard = 0;

    async function boot() {
      try {
        const response = await fetch("matches_data.json", { cache: "no-store" });
        if (!response.ok) throw new Error("matches_data.json not found");
        data = await response.json();
        document.title = data.pageTitle || "Prediction Suite";
        document.getElementById("brand").textContent = data.brand || "Prediction Suite";
        renderFixtureTabs();
        renderCardTabs();
        render();
      } catch (error) {
        document.querySelector(".app").insertAdjacentHTML("beforeend",
          '<div class="error">matches_data.json ကို index.html နဲ့ folder တူတူထားပါ။ GitHub Pages မှာ တင်ရင် အလိုအလျောက်အလုပ်လုပ်ပါမယ်။</div>'
        );
      }
    }

    function renderFixtureTabs() {
      const tabs = document.getElementById("fixtureTabs");
      tabs.innerHTML = data.matches.map((match, index) => `
        <button class="${index === activeMatch ? "active" : ""}" onclick="selectMatch(${index})">
          ${match.label || `Fixture ${index + 1}`}
        </button>
      `).join("");
    }

    function renderCardTabs() {
      const tabs = document.getElementById("cardTabs");
      tabs.innerHTML = cardTypes.map((card, index) => `
        <button class="${index === activeCard ? "active" : ""}" onclick="selectCard(${index})">
          ${card.label}
        </button>
      `).join("");
    }

    function selectMatch(index) {
      activeMatch = index;
      activeCard = 0;
      renderFixtureTabs();
      renderCardTabs();
      render();
    }

    function selectCard(index) {
      activeCard = index;
      renderCardTabs();
      render();
    }

    function render() {
      const match = data.matches[activeMatch];
      const photo = match.photo ? `url("${match.photo}")` : "";
      document.getElementById("matchHero").style.setProperty("--photo", photo);
      document.getElementById("matchHero").innerHTML = `
        <div class="team">
          <div class="crest" style="--jersey:${match.homeJersey || "#4f8cff"}"></div>
          <div class="team-name">${match.homeTeam}</div>
        </div>
        <div class="versus">VS</div>
        <div class="team away">
          <div class="crest" style="--jersey:${match.awayJersey || "#ef5555"}"></div>
          <div class="team-name">${match.awayTeam}</div>
        </div>
      `;

      document.getElementById("matchMeta").innerHTML = `
        <span>${match.competition || "Competition"}</span>
        <span>${match.kickoff || "Kickoff"}</span>
        <span>${match.venue || "Venue"}</span>
      `;

      const type = cardTypes[activeCard].id;
      document.getElementById("cardContent").innerHTML = cardTemplate(type, match);
    }

    function cardTemplate(type, match) {
      if (type === "matchup") {
        return `
          <h2>Card 1: ${match.homeTeam} vs ${match.awayTeam}</h2>
          <div class="two-col">
            <div class="box"><strong>${match.homeTeam}</strong><p>Home team photo/background ကို ${match.photo} မှာထည့်ပါ။</p></div>
            <div class="box"><strong>${match.awayTeam}</strong><p>Team name, time, venue ကို JSON ထဲမှာပြင်ပါ။</p></div>
          </div>
        `;
      }

      if (type === "formation") {
        return `
          <h2>Card 2: Formation, Jersey, Group</h2>
          <div class="two-col">
            <div class="box formation">
              <div class="mini-shirt" style="--jersey:${match.homeJersey}"></div>
              <div><strong>${match.homeTeam}</strong>${match.homeFormation}</div>
            </div>
            <div class="box formation">
              <div class="mini-shirt" style="--jersey:${match.awayJersey}"></div>
              <div><strong>${match.awayTeam}</strong>${match.awayFormation}</div>
            </div>
          </div>
          <div class="box" style="margin-top:14px"><strong>Group</strong>${match.groupNote || ""}</div>
        `;
      }

      if (type === "winner") {
        return `
          <h2>Card 3: Home Win / Draw / Away Win</h2>
          <div class="odds">
            <div class="odd">Home Win<b>${match.homeWin}</b></div>
            <div class="odd">Draw<b>${match.draw}</b></div>
            <div class="odd">Away Win<b>${match.awayWin}</b></div>
          </div>
        `;
      }

      if (type === "goals") {
        return `
          <h2>Card 4: Goal Tips</h2>
          <div class="box">
            <ul>${(match.goalTips || []).map(tip => `<li>${tip}</li>`).join("")}</ul>
          </div>
        `;
      }

      return `
        <h2>Card 5: သူငယ်ချင်းတို့အမြင်</h2>
        <div class="box friends">${match.friendsView || ""}</div>
      `;
    }

    boot();
  </script>
</body>
</html>
