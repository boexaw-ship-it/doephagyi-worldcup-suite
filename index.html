<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoePhaGyi Studio TV - 48 Matches Full Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; margin:0; padding:0; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* NO background — video ကနောက်ခံ ဖြစ်မယ် */
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* ── OUTER LAYOUT ── */
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 20px;
        }

        /* ── CONTROLS BAR (header) ── */
        #controls {
            width: 100%;
            max-width: 920px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(3,10,25,0.82);
            border: 1px solid rgba(201,162,39,0.35);
            border-radius: 14px;
            padding: 10px 18px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* LOGO */
        .logo {
            font-family: 'Bebas Neue','Impact',sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg,#c9a227,#f5e07a,#c9a227);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 6px rgba(201,162,39,0.5));
            line-height: 1;
        }
        .logo span {
            font-family: 'Inter',sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            -webkit-text-fill-color: #4ade80;
            filter: none;
            margin-left: 6px;
            letter-spacing: 0.06em;
        }

        /* MATCH SELECTOR */
        .match-wrap {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201,162,39,0.2);
            border-radius: 8px;
            padding: 5px 12px;
        }
        .match-wrap label {
            font-size: 9px;
            font-family: monospace;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }
        #match-selector {
            background: transparent;
            border: none;
            outline: none;
            color: #6ee7b7;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            max-width: 260px;
        }

        /* TAB BUTTONS */
        .tabs { display: flex; flex-wrap: wrap; gap: 6px; }
        .tab-btn {
            padding: 5px 11px;
            border-radius: 8px;
            font-size: 10px;
            font-family: monospace;
            font-weight: 800;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.45);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ── MAIN CARD ── */
        #main-card {
            width: 100%;
            max-width: 920px;
            /* dark navy glass — gold + teal neon မှ မြင်ရ */
            background: linear-gradient(155deg,
                rgba(4,14,32,0.93) 0%,
                rgba(3,22,36,0.88) 60%,
                rgba(4,14,30,0.93) 100%);
            backdrop-filter: blur(28px) saturate(1.4);
            -webkit-backdrop-filter: blur(28px) saturate(1.4);
            border: 1.5px solid rgba(201,162,39,0.55);
            border-radius: 22px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 0 50px rgba(201,162,39,0.18),
                0 0 100px rgba(0,160,120,0.10),
                inset 0 1px 0 rgba(255,255,255,0.06),
                inset 0 0 40px rgba(201,162,39,0.04);
            position: relative;
            overflow: hidden;
            /* ဒီ card က screen height ကို fill လုပ်မယ် */
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        /* gold corner brackets */
        #main-card::before, #main-card::after {
            content: '';
            position: absolute;
            width: 56px; height: 56px;
            border-color: rgba(201,162,39,0.5);
            border-style: solid;
            pointer-events: none;
            z-index: 2;
        }
        #main-card::before { top:12px; left:12px; border-width:2px 0 0 2px; border-radius:7px 0 0 0; }
        #main-card::after  { bottom:12px; right:12px; border-width:0 2px 2px 0; border-radius:0 0 7px 7px; }

        /* card inner sections */
        #segment-title {
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: rgba(201,162,39,0.7);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 1px solid rgba(201,162,39,0.18);
            padding: 16px 32px 13px;
        }
        #dynamic-content-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            width: 100%;
            min-height: 0;
        }
        #screen-id {
            font-family: monospace;
            font-size: 9px;
            letter-spacing: 0.15em;
            color: rgba(78,205,150,0.28);
            font-weight: 700;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding: 10px 32px 14px;
        }

        /* ── BADGES ── */
        .not-set-badge {
            background: rgba(239,68,68,0.12);
            border: 1px dashed rgba(239,68,68,0.4);
            color: #f87171;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            letter-spacing: 0.1em;
            font-weight: 700;
        }
        .neon-gold { text-shadow: 0 0 18px rgba(201,162,39,0.85), 0 0 6px rgba(201,162,39,0.5); }
        .team-title { font-family: 'Bebas Neue','Impact','Arial Black',sans-serif; letter-spacing:0.06em; }
    </style>
</head>
<body>
<div id="app">

    <!-- CONTROLS -->
    <div id="controls">
        <div class="logo">DOEPHAGYI<span>MONITOR</span></div>

        <div class="match-wrap">
            <label>SELECT MATCH:</label>
            <select id="match-selector" onchange="playClickSound(); changeMatch(this.value);"></select>
        </div>

        <div class="tabs">
            <button onclick="switchCard('card1'); playClickSound();" id="btn-card1" class="tab-btn">CARD 1: ပွဲစဉ် PROFILE</button>
            <button onclick="switchCard('card2'); playClickSound();" id="btn-card2" class="tab-btn">CARD 2: FORMATION</button>
            <button onclick="switchCard('card3'); playClickSound();" id="btn-card3" class="tab-btn">CARD 3: % နိုင်ခြေ</button>
            <button onclick="switchCard('card4'); playClickSound();" id="btn-card4" class="tab-btn">CARD 4: PREDICTION</button>
            <button onclick="switchCard('card5'); playClickSound();" id="btn-card5" class="tab-btn">CARD 5: ဖန်ဇုန်</button>
        </div>
    </div>

    <!-- MAIN CARD -->
    <div id="main-card">
        <div id="segment-title">LOADING DATA SUITE...</div>
        <div id="dynamic-content-box"></div>
        <div id="screen-id">STREAM_SYS_ID: #STARTING</div>
    </div>

</div>

<script>
    let rawFixtures = [];
    let matchesData = {};
    let currentMatchIndex = 0;
    let currentCardType = 'card1';
    let audioCtx = null;

    function playClickSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(580, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        } catch(e) {}
    }

    function getFlag(abbr) {
        const flags = {
            "MEX":"🇲🇽","RSA":"🇿🇦","KOR":"🇰🇷","CZE":"🇨🇿","CAN":"🇨🇦","BIH":"🇧🇦",
            "USA":"🇺🇸","PAR":"🇵🇾","BRA":"🇧🇷","MAR":"🇲🇦","ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","CRO":"🇭🇷",
            "ARG":"🇦🇷","FRA":"🇫🇷","GER":"🇩🇪","ITA":"🇮🇹","ESP":"🇪🇸","POR":"🇵🇹",
            "NED":"🇳🇱","BEL":"🇧🇪","SEN":"🇸🇳","JPN":"🇯🇵","URU":"🇺🇾","GHA":"🇬🇭",
            "QAT":"🇶🇦","SUI":"🇨🇭","HAI":"🇭🇹","SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","AUS":"🇦🇺","TUR":"🇹🇷",
            "CUW":"🇨🇼","ECU":"🇪🇨","CIV":"🇨🇮","SWE":"🇸🇪","TUN":"🇹🇳","CPV":"🇨🇻",
            "EGY":"🇪🇬","KSA":"🇸🇦","IRN":"🇮🇷","NZL":"🇳🇿","NOR":"🇳🇴","ALG":"🇩🇿",
            "AUT":"🇦🇹","JOR":"🇯🇴","COD":"🇨🇩","PAN":"🇵🇦","UZB":"🇺🇿","COL":"🇨🇴",
            "IRQ":"🇮🇶","GBR":"🇬🇧","WAL":"🏴󠁧󠁢󠁷󠁬󠁳󠁿"
        };
        return flags[abbr] || "🏳️";
    }

    // ── FORMATION ──
    function parseFormation(f) {
        if (!f || !f.trim()) return null;
        const p = f.trim().split('-').map(Number);
        return p.some(isNaN) || p.length < 2 ? null : p;
    }
    function rowLabels(count, type) {
        const m = {
            fwd:{1:['ST'],2:['LW','RW'],3:['LW','ST','RW'],4:['LW','CF','CF','RW'],5:['LW','IF','ST','IF','RW']},
            mid:{1:['CM'],2:['CM','CM'],3:['CM','CM','CM'],4:['LM','CM','CM','RM'],5:['LM','CM','DM','CM','RM'],6:['LM','CM','CM','CM','CM','RM']},
            def:{2:['LB','RB'],3:['LB','CB','RB'],4:['LB','CB','CB','RB'],5:['LWB','CB','CB','CB','RWB']}
        };
        return (m[type]&&m[type][count]) || Array(count).fill(type.slice(0,2).toUpperCase());
    }
    function buildPitchHTML(formation, teamName, abbr, isHome) {
        const rows = parseFormation(formation);
        const ac = isHome ? 'rgba(110,231,183,0.95)' : 'rgba(147,197,253,0.95)';
        const ab = isHome ? 'rgba(52,211,153,0.45)'  : 'rgba(96,165,250,0.45)';
        const ag = isHome ? 'rgba(52,211,153,0.2)'   : 'rgba(96,165,250,0.2)';

        const panel = [
            'background: linear-gradient(180deg,#055c45 0%,#076652 45%,#055c45 100%)',
            'background-image: repeating-linear-gradient(180deg, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 40px)',
            'border: 1.5px solid ' + ab,
            'border-radius: 14px',
            'padding: 12px 8px',
            'display: flex',
            'flex-direction: column',
            'justify-content: space-between',
            'gap: 8px',
            'height: 100%',
            'position: relative',
            'overflow: hidden',
            'box-shadow: 0 0 24px ' + ag + ', inset 0 0 50px rgba(0,0,0,0.3)'
        ].join(';') + ';';

        const badge = (lbl, color, brd) =>
            `<div style="display:inline-block;padding:4px 10px;border-radius:6px;border:1px solid ${brd};background:rgba(2,8,20,0.75);font-family:monospace;font-size:11px;font-weight:800;color:${color};letter-spacing:0.04em;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.5);">${lbl}</div>`;

        const rowDiv = (lbls, color, brd) =>
            `<div style="display:flex;justify-content:space-around;align-items:center;width:100%;">${lbls.map(l=>badge(l,color,brd)).join('')}</div>`;

        const header = `<div style="text-align:center;font-family:monospace;font-size:12px;font-weight:800;color:${ac};letter-spacing:0.07em;border-bottom:1px solid ${ab};padding-bottom:7px;">${getFlag(abbr)} ${teamName.toUpperCase()}<span style="color:rgba(251,191,36,0.8);margin-left:5px;">${formation?'['+formation+']':''}</span></div>`;

        if (!rows) {
            return `<div style="${panel}align-items:center;justify-content:center;">${header}<span class="not-set-badge">FORMATION NOT SET</span></div>`;
        }

        const total = rows.length;
        let html = '';
        html += rowDiv(rowLabels(rows[total-1],'fwd'), 'rgba(251,191,36,0.95)', 'rgba(245,158,11,0.4)');
        for (let i=total-2; i>=1; i--) html += rowDiv(rowLabels(rows[i],'mid'), 'rgba(255,255,255,0.8)', 'rgba(255,255,255,0.14)');
        html += rowDiv(rowLabels(rows[0],'def'), 'rgba(255,255,255,0.7)', 'rgba(255,255,255,0.12)');
        html += `<div style="display:flex;justify-content:center;">${badge('🧤 GK',ac,ab)}</div>`;

        return `<div style="${panel}">${header}${html}</div>`;
    }

    // ── LOAD JSON ──
    async function loadFixturesData() {
        try {
            const [rRes, mRes] = await Promise.all([fetch('rounds.json'), fetch('matches_data.json')]);
            const roundsData = await rRes.json();
            matchesData = await mRes.json();
            rawFixtures = [];
            roundsData.forEach(r => {
                if (r.stage==="GROUP" && r.tournaments) r.tournaments.forEach(m => rawFixtures.push(m));
            });
            buildMatchDropdown();
            renderContent();
        } catch(e) {
            document.getElementById('segment-title').innerText = "ERROR: CHECK JSON FILES";
            console.error(e);
        }
    }

    function buildMatchDropdown() {
        const sel = document.getElementById('match-selector');
        sel.innerHTML = rawFixtures.map((m,idx) => {
            const mid = m.id;
            const md = matchesData[mid] || {};
            const has = md.formation_home || md.win_home>0 || md.pred_home_score>0 || md.pred_away_score>0;
            return `<option value="${idx}">${has?'✅':'⬜'} Match ${mid}: ${m.homeSquadName} vs ${m.awaySquadName}</option>`;
        }).join('');
    }

    function changeMatch(i) { currentMatchIndex=parseInt(i); renderContent(); }

    function switchCard(type) {
        currentCardType = type;
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.style.background = 'rgba(255,255,255,0.05)';
            b.style.borderColor = 'rgba(255,255,255,0.1)';
            b.style.color = 'rgba(255,255,255,0.45)';
            b.style.boxShadow = 'none';
        });
        const a = document.getElementById('btn-'+type);
        a.style.background = 'linear-gradient(135deg,#b8860b,#d4a017,#c9a227)';
        a.style.borderColor = '#d4a017';
        a.style.color = '#000';
        a.style.boxShadow = '0 0 12px rgba(201,162,39,0.45)';
        renderContent();
    }

    // ── RENDER ──
    function renderContent() {
        if (!rawFixtures.length) return;
        const match = rawFixtures[currentMatchIndex];
        const box   = document.getElementById('dynamic-content-box');
        const seg   = document.getElementById('segment-title');
        const sid   = document.getElementById('screen-id');
        const mid   = String(match.id);
        const md    = matchesData[mid] || {};

        const fH  = md.formation_home   || '';
        const fA  = md.formation_away   || '';
        const wH  = md.win_home         || 0;
        const wD  = md.win_draw         || 0;
        const wA  = md.win_away         || 0;
        const pH  = md.pred_home_score  ?? null;
        const pA  = md.pred_away_score  ?? null;
        const pC  = md.pred_comment     || '';

        const dateStr = "📅 " + new Date(match.date).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});

        // ── CARD 1: PROFILE ──
        if (currentCardType==='card1') {
            seg.innerText = "FIFA WORLD CUP 2026 // MATCH PROFILE";
            sid.innerText = "OVERLAY_ID: #"+mid+"_PROFILE";
            box.innerHTML = `
                <div style="text-align:center;width:100%;">
                    <div style="font-family:monospace;font-size:1rem;font-weight:700;color:rgba(201,162,39,0.9);background:rgba(201,162,39,0.08);border:1px solid rgba(201,162,39,0.2);border-radius:999px;display:inline-block;padding:6px 24px;margin-bottom:28px;letter-spacing:0.08em;">${dateStr}</div>
                    <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:28px;flex-wrap:wrap;">
                        <div style="font-family:'Bebas Neue','Impact',sans-serif;font-size:2.6rem;font-weight:900;letter-spacing:0.06em;line-height:1;">${getFlag(match.homeSquadAbbr)} ${match.homeSquadName.toUpperCase()}</div>
                        <div style="font-family:'Bebas Neue','Impact',sans-serif;font-size:2rem;color:rgba(201,162,39,0.9);text-shadow:0 0 20px rgba(201,162,39,0.7);padding:0 8px;">VS</div>
                        <div style="font-family:'Bebas Neue','Impact',sans-serif;font-size:2.6rem;font-weight:900;letter-spacing:0.06em;line-height:1;">${match.awaySquadName.toUpperCase()} ${getFlag(match.awaySquadAbbr)}</div>
                    </div>
                    <div style="font-family:monospace;font-size:0.85rem;font-weight:600;color:#6ee7b7;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.18);border-radius:10px;display:inline-block;padding:7px 20px;letter-spacing:0.06em;">📍 ${match.venueName||'Main Stadium'}, ${match.venueCity||'Host City'}</div>
                </div>`;
        }

        // ── CARD 2: FORMATION ──
        else if (currentCardType==='card2') {
            seg.innerText = "FIFA WORLD CUP 2026 // SQUAD FORMATION LAYOUT";
            sid.innerText = "OVERLAY_ID: #"+mid+"_FORMATION";
            box.innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;height:100%;">
                    ${buildPitchHTML(fH,match.homeSquadName,match.homeSquadAbbr,true)}
                    ${buildPitchHTML(fA,match.awaySquadName,match.awaySquadAbbr,false)}
                </div>`;
        }

        // ── CARD 3: WIN % ──
        else if (currentCardType==='card3') {
            seg.innerText = "FIFA WORLD CUP 2026 // WIN PROBABILITY ANALYTICS";
            sid.innerText = "OVERLAY_ID: #"+mid+"_PROBABILITY";
            const total = wH+wD+wA;
            if (!total) {
                box.innerHTML = `<div style="text-align:center;"><div style="font-size:3rem;margin-bottom:16px;">📊</div><span class="not-set-badge" style="font-size:1rem;padding:10px 28px;">WIN % DATA NOT SET YET</span><p style="margin-top:12px;font-family:monospace;font-size:11px;color:rgba(255,255,255,0.3);">matches_data.json မှာ win_home / win_draw / win_away ဖြည့်ပါ</p></div>`;
            } else {
                const bar = (lbl,val,g1,g2,glow) => `
                    <div>
                        <div style="display:flex;justify-content:space-between;font-family:monospace;font-size:13px;font-weight:800;color:${g2};letter-spacing:0.08em;margin-bottom:6px;"><span>${lbl}</span><span>${val}%</span></div>
                        <div style="width:100%;background:rgba(0,0,0,0.5);height:22px;border-radius:999px;padding:3px;border:1px solid rgba(255,255,255,0.07);">
                            <div style="width:${val}%;background:linear-gradient(90deg,${g1},${g2});height:100%;border-radius:999px;box-shadow:0 0 12px ${glow};transition:width 0.6s ease;"></div>
                        </div>
                    </div>`;
                box.innerHTML = `
                    <div style="width:100%;max-width:560px;display:flex;flex-direction:column;gap:20px;">
                        ${bar(match.homeSquadName.toUpperCase()+' WIN', wH, '#065f46','#34d399','rgba(52,211,153,0.5)')}
                        ${bar('DRAW', wD, '#78350f','#fbbf24','rgba(251,191,36,0.5)')}
                        ${bar(match.awaySquadName.toUpperCase()+' WIN', wA, '#1e3a8a','#60a5fa','rgba(96,165,250,0.5)')}
                        ${total!==100?`<p style="text-align:center;color:#f87171;font-family:monospace;font-size:11px;">⚠️ စုစုပေါင်း ${total}% — 100% ဖြစ်အောင် စစ်ပေးပါ</p>`:''}
                    </div>`;
            }
        }

        // ── CARD 4: PREDICTION ──
        else if (currentCardType==='card4') {
            seg.innerText = "FIFA WORLD CUP 2026 // EXPERT FORECAST TIPS";
            sid.innerText = "OVERLAY_ID: #"+mid+"_VERDICT";
            const ready = pH!==null && pA!==null && (pH>0||pA>0||pC!=='');
            if (!ready) {
                box.innerHTML = `<div style="text-align:center;"><div style="font-size:3rem;margin-bottom:16px;">🔮</div><span class="not-set-badge" style="font-size:1rem;padding:10px 28px;">PREDICTION NOT SET YET</span></div>`;
            } else {
                let comment = pC || (pH>pA ? `${match.homeSquadName} ရဲ့ အောင်ပွဲကို မြင်တွေ့ရနိုင်ပါတယ်` : pA>pH ? `${match.awaySquadName} ရဲ့ အောင်ပွဲကို မြင်တွေ့ရနိုင်ပါတယ်` : 'ခြေရည်တူပြီး သရေကျဖို့ အလားအလာရှိပါတယ်');
                box.innerHTML = `
                    <div style="text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;">
                        <div style="background:linear-gradient(90deg,#b8860b,#f5e07a,#b8860b);color:#000;font-family:monospace;font-weight:900;font-size:11px;letter-spacing:0.18em;padding:5px 24px;border-radius:999px;box-shadow:0 0 18px rgba(201,162,39,0.5);text-transform:uppercase;">DOEPHAGYI'S CHOICE</div>
                        <div style="display:flex;align-items:center;gap:20px;">
                            <div style="text-align:right;min-width:130px;">
                                <div style="font-size:1.8rem;line-height:1;">${getFlag(match.homeSquadAbbr)}</div>
                                <div style="font-family:monospace;font-size:11px;font-weight:800;color:#6ee7b7;letter-spacing:0.07em;margin-top:4px;">${match.homeSquadName.toUpperCase()}</div>
                            </div>
                            <div style="font-family:'Bebas Neue','Impact',sans-serif;font-size:5.5rem;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,255,255,0.25),0 4px 20px rgba(0,0,0,0.8);line-height:1;white-space:nowrap;">${pH} <span style="color:rgba(201,162,39,0.9);text-shadow:0 0 20px rgba(201,162,39,0.8);">-</span> ${pA}</div>
                            <div style="text-align:left;min-width:130px;">
                                <div style="font-size:1.8rem;line-height:1;">${getFlag(match.awaySquadAbbr)}</div>
                                <div style="font-family:monospace;font-size:11px;font-weight:800;color:#93c5fd;letter-spacing:0.07em;margin-top:4px;">${match.awaySquadName.toUpperCase()}</div>
                            </div>
                        </div>
                        <div style="width:55%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,39,0.4),transparent);"></div>
                        <div style="font-size:1.2rem;font-weight:800;color:rgba(251,191,36,0.95);text-shadow:0 0 16px rgba(201,162,39,0.7);max-width:460px;line-height:1.5;">"${comment}"</div>
                    </div>`;
            }
        }

        // ── CARD 5: ဖန်ဇုန် ──
        else if (currentCardType==='card5') {
            seg.innerText = "FIFA WORLD CUP 2026 // AUDIENCE INTERACTION";
            sid.innerText = "OVERLAY_ID: #"+mid+"_ENGAGEMENT";
            box.innerHTML = `
                <div style="text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;">
                    <div style="font-size:4.5rem;animation:bounce 1s infinite alternate;filter:drop-shadow(0 0 12px rgba(201,162,39,0.6));">⚽</div>
                    <div style="font-family:'Bebas Neue','Impact',sans-serif;font-size:2.2rem;letter-spacing:0.05em;line-height:1.2;color:#fff;">"သူငယ်ချင်းတို့ အမြင်ကရော ဗျာ?"</div>
                    <div style="font-family:monospace;font-size:1rem;font-weight:700;color:#6ee7b7;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:12px;padding:10px 28px;letter-spacing:0.05em;">ဘယ်သူနိုင်မလဲ ကောမန့်မှာ တစ်ခါတည်း ရေးပေးခဲ့ဦးနော်!</div>
                </div>`;
        }
    }

    window.onload = () => {
        // set card1 active on load
        const a = document.getElementById('btn-card1');
        a.style.background = 'linear-gradient(135deg,#b8860b,#d4a017,#c9a227)';
        a.style.borderColor = '#d4a017';
        a.style.color = '#000';
        a.style.boxShadow = '0 0 12px rgba(201,162,39,0.45)';
        loadFixturesData();
    };
</script>
<style>
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
</style>
</body>
</html>
