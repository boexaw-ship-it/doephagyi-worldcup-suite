<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoePhaGyi Studio TV - Automated World Cup Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #020617;
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.4), rgba(2, 6, 23, 0.95)), url('background.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        .wc-premium-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(6, 78, 59, 0.4) 100%);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 35px rgba(16, 185, 129, 0.25), inset 0 0 20px rgba(245, 158, 11, 0.1);
        }
        .neon-gold {
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.8), 0 0 5px rgba(245, 158, 11, 0.5);
        }
        .team-title {
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="text-white font-sans h-screen flex flex-col justify-between p-6 select-none">

    <div class="max-w-7xl mx-auto w-full border-b-2 border-amber-500/30 pb-4 space-y-4">
        <div class="flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="text-4xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-500 neon-gold">
                DOEPHAGYI <span class="text-emerald-400 text-2xl font-semibold tracking-normal">MONITOR</span>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl">
                <span class="text-xs font-mono text-slate-400 font-bold">SELECT MATCH:</span>
                <select id="match-selector" onchange="playClickSound(); changeMatch(this.value);" class="bg-transparent text-sm font-bold text-emerald-400 outline-none cursor-pointer">
                    </select>
            </div>

            <div class="flex flex-wrap justify-center gap-2 font-mono text-xs md:text-sm font-black">
                <button onclick="switchCard('card1'); playClickSound();" id="btn-card1" class="tab-btn px-4 py-2 bg-amber-500 text-black rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.4)] transition-all">CARD 1: ပွဲစဉ် PROFILE</button>
                <button onclick="switchCard('card2'); playClickSound();" id="btn-card2" class="tab-btn px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl hover:bg-slate-800 transition-all">CARD 2: LINE-UPS</button>
                <button onclick="switchCard('card3'); playClickSound();" id="btn-card3" class="tab-btn px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl hover:bg-slate-800 transition-all">CARD 3: % နိုင်ခြေ</button>
                <button onclick="switchCard('card4'); playClickSound();" id="btn-card4" class="tab-btn px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl hover:bg-slate-800 transition-all">CARD 4: PREDICTION</button>
                <button onclick="switchCard('card5'); playClickSound();" id="btn-card5" class="tab-btn px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl hover:bg-slate-800 transition-all">CARD 5: ဖန်ဇုန်</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto w-full h-[65vh] flex items-center justify-center my-auto px-4">
        <div class="w-full h-full wc-premium-card p-8 rounded-3xl flex flex-col justify-between relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl"></div>

            <div id="segment-title" class="text-amber-400/80 font-mono text-xs tracking-widest uppercase border-b border-emerald-500/30 pb-3 text-center font-bold">
                LOADING DATA SUITE...
            </div>

            <div id="dynamic-content-box" class="my-auto w-full"></div>

            <div id="screen-id" class="text-emerald-500/50 font-mono text-xs text-center font-bold tracking-widest">
                STREAM_SYS_ID: #STARTING
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto w-full border-t border-slate-800 pt-3 flex justify-between text-[11px] font-mono text-slate-500 tracking-widest">
        <div>JSON AUTOMATION SUITE ONLINE</div>
        <div>STADIUM OVERLAY CONFIG ENGINE v5.0</div>
    </div>

    <script>
        let rawFixtures = [];
        let rawPlayers = [];
        let rawSquads = {};
        
        let currentMatchIndex = 0;
        let currentCardType = 'card1';
        let audioCtx = null;

        // အသံစနစ်
        function playClickSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } catch (e) {}
        }

        // JSON ဖိုင်များကို အလိုအလျောက် လှမ်းဖတ်သည့်စနစ်
        async function loadJsonData() {
            try {
                const squadsResponse = await fetch('squads.json');
                const squadsData = await squadsResponse.json();
                squadsData.forEach(s => { rawSquads[s.id] = s; });

                const roundsResponse = await fetch('rounds.json');
                const roundsData = await roundsResponse.json();
                
                // Group Stage ပွဲစဉ်အားလုံးကို ထုတ်ယူခြင်း
                rawFixtures = [];
                roundsData.forEach(r => {
                    if(r.tournaments) {
                        r.tournaments.forEach(t => { rawFixtures.push(t); });
                    }
                });

                const playersResponse = await fetch('player.json');
                rawPlayers = await playersResponse.json();

                buildMatchSelector();
                renderContent();
            } catch (error) {
                document.getElementById('segment-title').innerText = "ERROR LOADING JSON FILES";
                console.error(error);
            }
        }

        // Dropdown List ဆောက်ခြင်း
        function buildMatchSelector() {
            const selector = document.getElementById('match-selector');
            selector.innerHTML = rawFixtures.map((m, idx) => {
                return `<option value="${idx}">Match ${idx + 1}: ${m.homeSquadName} vs ${m.awaySquadName}</option>`;
            }).join('');
        }

        function changeMatch(index) {
            currentMatchIndex = parseInt(index);
            renderContent();
        }

        function switchCard(cardType) {
            currentCardType = cardType;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn px-4 py-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl hover:bg-slate-800 transition-all";
            });
            document.getElementById('btn-' + cardType).className = "tab-btn px-4 py-2 bg-amber-500 text-black rounded-xl font-black shadow-[0_0_15px_rgba(245,158,11,0.4)] transition-all";
            renderContent();
        }

        // ကစားသမားခန့်မှန်းချက် ထုတ်ယူရန် Helper
        function getExpectedPlayers(squadId) {
            return rawPlayers
                .filter(p => p.squadId === squadId)
                .slice(0, 4)
                .map(p => {
                    let prefix = p.oneToWatch ? "★ " : "• ";
                    let suffix = p.oneToWatch ? " (Key)" : "";
                    return `${prefix}${p.firstName} ${p.lastName} (${p.position})${suffix}`;
                });
        }

        // နိုင်ငံအလိုက် အလံပြောင်းရန် Helper
        function getFlag(abbr) {
            const flags = { "MEX": "🇲🇽", "RSA": "🇿🇦", "KOR": "🇰🇷", "CZE": "🇨🇿", "CAN": "🇨🇦", "BIH": "🇧🇦", "USA": "🇺🇸", "PAR": "🇵🇾", "BRA": "🇧🇷", "MAR": "🇲🇦", "ENG": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "CRO": "🇭🇷", "ARG": "🇦🇷", "FRA": "🇫🇷" };
            return flags[abbr] || "🏳️";
        }

        // JSON Data ပေါ်မူတည်၍ တွက်ချက်ပြီး Screen ပေါ်ပြသခြင်း
        function renderContent() {
            if (rawFixtures.length === 0) return;

            const match = rawFixtures[currentMatchIndex];
            const contentBox = document.getElementById('dynamic-content-box');
            const segTitle = document.getElementById('segment-title');
            const scrId = document.getElementById('screen-id');

            // JSON ဒေတာများပေါ်မူတည်ပြီး နိုင်ခြေရာခိုင်နှုန်းများကို Algorithm အလိုက် အလိုအလျောက်ထုတ်ပေးခြင်း
            let homeWinPercent = Math.min(65, Math.max(30, (match.homeSquadId % 25) + 35));
            let awayWinPercent = Math.min(45, Math.max(15, (match.awaySquadId % 20) + 15));
            let drawPercent = 100 - homeWinPercent - awayWinPercent;

            // ခန့်မှန်းရလဒ်များကို အလိုအလျောက် ပုံဖော်ခြင်း
            let predictedHomeScore = homeWinPercent > awayWinPercent ? 2 : 1;
            let predictedAwayScore = homeWinPercent > awayWinPercent ? 1 : 2;
            if(Math.abs(homeWinPercent - awayWinPercent) < 5) {
                predictedHomeScore = 1; predictedAwayScore = 1;
            }

            let dateObj = new Date(match.date);
            let formattedDate = "📅 " + dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

            if (currentCardType === 'card1') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // MATCH PROFILE";
                scrId.innerText = "OVERLAY_ID: #" + (currentMatchIndex + 1) + "_PROFILE";
                contentBox.innerHTML = `
                    <div class="text-center space-y-6">
                        <div class="text-xl font-mono text-amber-400 font-bold tracking-widest bg-amber-500/10 border border-amber-500/20 px-6 py-1.5 rounded-full inline-block shadow-inner">${formattedDate}</div>
                        <div class="flex items-center justify-center gap-6 py-4">
                            <div class="text-4xl md:text-5xl font-black team-title tracking-wider text-white drop-shadow-md">${getFlag(match.homeSquadAbbr)} ${match.homeSquadName.toUpperCase()}</div>
                            <div class="text-amber-500 font-black text-4xl neon-gold px-4">VS</div>
                            <div class="text-4xl md:text-5xl font-black team-title tracking-wider text-white drop-shadow-md">${match.awaySquadName.toUpperCase()} ${getFlag(match.awaySquadAbbr)}</div>
                        </div>
                        <div class="text-sm font-mono text-emerald-400 font-semibold tracking-wider bg-emerald-950/40 border border-emerald-500/10 px-4 py-1.5 rounded-xl inline-block">📍 ${match.venueName || 'Main Stadium'}, ${match.venueCity || 'Host City'}</div>
                    </div>
                `;
            } 
            else if (currentCardType === 'card2') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // EXPECTED SQUAD SELECTIONS";
                scrId.innerText = "OVERLAY_ID: #" + (currentMatchIndex + 1) + "_LINEUPS";
                
                let homeLineup = getExpectedPlayers(match.homeSquadId);
                let awayLineup = getExpectedPlayers(match.awaySquadId);

                contentBox.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
                        <div class="bg-slate-950/60 p-5 rounded-2xl border-l-4 border-emerald-500 shadow-xl">
                            <div class="text-emerald-400 font-black text-sm tracking-widest mb-4 border-b border-slate-800 pb-2 uppercase">${getFlag(match.homeSquadAbbr)} ${match.homeSquadName} EXPECTED LIST</div>
                            <div class="text-base font-mono space-y-2.5 text-slate-200">
                                ${homeLineup.length ? homeLineup.map(p => `<div class="bg-slate-900/40 px-3 py-1 rounded border border-slate-800/40">${p}</div>`).join('') : '<div class="text-slate-500">Loading Squad...</div>'}
                            </div>
                        </div>
                        <div class="bg-slate-950/60 p-5 rounded-2xl border-l-4 border-blue-500 shadow-xl">
                            <div class="text-blue-400 font-black text-sm tracking-widest mb-4 border-b border-slate-800 pb-2 uppercase">${getFlag(match.awaySquadAbbr)} ${match.awaySquadName} EXPECTED LIST</div>
                            <div class="text-base font-mono space-y-2.5 text-slate-200">
                                ${awayLineup.length ? awayLineup.map(p => `<div class="bg-slate-900/40 px-3 py-1 rounded border border-slate-800/40">${p}</div>`).join('') : '<div class="text-slate-500">Loading Squad...</div>'}
                            </div>
                        </div>
                    </div>
                `;
            } 
            else if (currentCardType === 'card3') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // WIN PROBABILITY ANALYTICS";
                scrId.innerText = "OVERLAY_ID: #" + (currentMatchIndex + 1) + "_PROBABILITY";
                contentBox.innerHTML = `
                    <div class="space-y-6 max-w-xl mx-auto w-full px-4">
                        <div>
                            <div class="flex justify-between text-sm font-mono font-black mb-1 text-emerald-400 tracking-wider"><span>${match.homeSquadName.toUpperCase()} WIN</span><span>${homeWinPercent}%</span></div>
                            <div class="w-full bg-slate-950 h-5 rounded-full p-1 border border-slate-800 shadow-inner"><div class="bg-gradient-to-r from-emerald-600 to-emerald-400 h-full rounded-full shadow-[0_0_15px_#10b981]" style="width: ${homeWinPercent}%"></div></div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm font-mono font-black mb-1 text-amber-400 tracking-wider"><span>DRAW PROBABILITY</span><span>${drawPercent}%</span></div>
                            <div class="w-full bg-slate-950 h-5 rounded-full p-1 border border-slate-800 shadow-inner"><div class="bg-gradient-to-r from-amber-600 to-amber-400 h-full rounded-full shadow-[0_0_15px_#f59e0b]" style="width: ${drawPercent}%"></div></div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm font-mono font-black mb-1 text-blue-400 tracking-wider"><span>${match.awaySquadName.toUpperCase()} WIN</span><span>${awayWinPercent}%</span></div>
                            <div class="w-full bg-slate-950 h-5 rounded-full p-1 border border-slate-800 shadow-inner"><div class="bg-gradient-to-r from-blue-600 to-blue-400 h-full rounded-full shadow-[0_0_15px_#3b82f6]" style="width: ${awayWinPercent}%"></div></div>
                        </div>
                    </div>
                `;
            } 
            else if (currentCardType === 'card4') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // EXPERT FORECAST TIPS";
                scrId.innerText = "OVERLAY_ID: #" + (currentMatchIndex + 1) + "_VERDICT";
                
                let decisionText = predictedHomeScore === predictedAwayScore ? "ခြေရည်တူပြီး အကြိတ်အနယ် သရေကျမယ့်ပွဲ" : `${match.homeSquadName} အိမ်ကွင်းပရိသတ်အားနဲ့ ကပ်နိုင်မယ့်ပွဲ`;

                contentBox.innerHTML = `
                    <div class="text-center space-y-6">
                        <div class="text-xs font-black bg-gradient-to-r from-amber-500 to-yellow-400 text-black px-6 py-1.5 rounded-full inline-block uppercase tracking-widest shadow-md">DOEPHAGYI'S CHOICE</div>
                        <div class="font-mono text-8xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400 drop-shadow-2xl py-2">${predictedHomeScore} - ${predictedAwayScore}</div>
                        <div class="text-2xl md:text-3xl text-amber-400 font-extrabold tracking-wide max-w-xl mx-auto neon-gold">"${decisionText}"</div>
                    </div>
                `;
            } 
            else if (currentCardType === 'card5') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // AUDIENCE INTERACTION";
                scrId.innerText = "OVERLAY_ID: #" + (currentMatchIndex + 1) + "_ENGAGEMENT";
                contentBox.innerHTML = `
                    <div class="text-center space-y-6 max-w-xl mx-auto">
                        <div class="text-amber-400 text-7xl neon-gold animate-bounce">⚽</div>
                        <div class="text-3xl md:text-4xl font-black tracking-wide text-white leading-tight">"သူငယ်ချင်းတို့ အမြင်ကရော ဗျာ?"</div>
                        <p class="text-lg text-emerald-400 font-semibold tracking-wide bg-emerald-950/40 border border-emerald-500/20 py-2 px-6 rounded-xl inline-block">ဘယ်သူနိုင်မလဲ ကောမန့်မှာ တစ်ခါတည်း ရေးပေးခဲ့ဦးနော်!</p>
                    </div>
                `;
            }
        }

        // စတင်ချိန်တွင် JSON များအား အလိုအလျောက် ဖတ်ယူရန် ညွှန်ကြားခြင်း
        window.onload = loadJsonData;
    </script>
</body>
</html>
