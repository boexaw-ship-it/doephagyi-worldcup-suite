<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoePhaGyi Studio TV - 48 Matches Full Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; }

        body {
            background-color: #020c18;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* gold border card */
        .wc-premium-card {
            background: linear-gradient(160deg,
                rgba(3,12,28,0.90) 0%,
                rgba(2,24,36,0.85) 55%,
                rgba(3,16,26,0.90) 100%);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border: 1.5px solid rgba(201,162,39,0.6);
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04),
                0 0 45px rgba(201,162,39,0.2),
                0 0 90px rgba(0,150,110,0.1),
                inset 0 1px 0 rgba(255,255,255,0.07),
                inset 0 0 32px rgba(201,162,39,0.05);
            position: relative;
            overflow: hidden;
        }
        /* corner accent */
        .wc-premium-card::before, .wc-premium-card::after {
            content: '';
            position: absolute;
            width: 52px; height: 52px;
            border-color: rgba(201,162,39,0.55);
            border-style: solid;
            pointer-events: none;
        }
        .wc-premium-card::before { top:10px; left:10px; border-width:2px 0 0 2px; border-radius:6px 0 0 0; }
        .wc-premium-card::after  { bottom:10px; right:10px; border-width:0 2px 2px 0; border-radius:0 0 6px 6px; }

        .neon-gold {
            text-shadow: 0 0 18px rgba(201,162,39,0.85), 0 0 6px rgba(201,162,39,0.5);
        }
        .team-title {
            font-family: 'Bebas Neue','Impact','Arial Black',sans-serif;
            letter-spacing: 0.06em;
        }
        .not-set-badge {
            background: rgba(239,68,68,0.12);
            border: 1px dashed rgba(239,68,68,0.45);
            color: #f87171;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            letter-spacing: 0.1em;
            font-weight: 700;
        }
        /* tab active gold */
        .tab-btn-active {
            background: linear-gradient(135deg,#b8860b,#d4a017,#c9a227) !important;
            color: #000 !important;
            border-color: #d4a017 !important;
            box-shadow: 0 0 14px rgba(201,162,39,0.5) !important;
        }
    </style>
</head>
<body class="text-white font-sans h-screen flex flex-col justify-between select-none" style="padding:18px 28px;">

    <!-- ===== HEADER ===== -->
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; border-bottom:1px solid rgba(201,162,39,0.3); padding-bottom:14px;">

        <!-- LOGO -->
        <div style="font-family:'Bebas Neue','Impact',sans-serif; font-size:1.9rem; letter-spacing:0.1em; background:linear-gradient(90deg,#c9a227,#f5e07a,#c9a227); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 8px rgba(201,162,39,0.6));">
            DOEPHAGYI <span style="font-size:1rem; font-family:'Inter',sans-serif; font-weight:700; -webkit-text-fill-color:#4ade80; filter:none; letter-spacing:0.05em;">MONITOR</span>
        </div>

        <!-- MATCH SELECTOR -->
        <div style="display:flex; align-items:center; gap:8px; background:rgba(3,10,25,0.8); border:1px solid rgba(201,162,39,0.3); border-radius:10px; padding:6px 14px;">
            <span style="font-size:10px; font-family:monospace; color:rgba(255,255,255,0.4); font-weight:700; letter-spacing:0.1em; white-space:nowrap;">SELECT MATCH:</span>
            <select id="match-selector" onchange="playClickSound(); changeMatch(this.value);"
                style="background:transparent; border:none; outline:none; color:#6ee7b7; font-weight:700; font-size:13px; cursor:pointer; max-width:320px;">
            </select>
        </div>

        <!-- TAB BUTTONS -->
        <div class="flex flex-wrap justify-center gap-2">
            <button onclick="switchCard('card1'); playClickSound();" id="btn-card1"
                class="tab-btn px-3 py-1.5 rounded-lg text-xs font-black font-mono border border-amber-500/60 bg-gradient-to-r from-yellow-700 to-amber-500 text-black shadow-[0_0_12px_rgba(201,162,39,0.4)] transition-all">CARD 1: ပွဲစဉ် PROFILE</button>
            <button onclick="switchCard('card2'); playClickSound();" id="btn-card2"
                class="tab-btn px-3 py-1.5 rounded-lg text-xs font-black font-mono border transition-all" style="background:rgba(3,10,25,0.8); border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5);">CARD 2: FORMATION</button>
            <button onclick="switchCard('card3'); playClickSound();" id="btn-card3"
                class="tab-btn px-3 py-1.5 rounded-lg text-xs font-black font-mono border transition-all" style="background:rgba(3,10,25,0.8); border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5);">CARD 3: % နိုင်ခြေ</button>
            <button onclick="switchCard('card4'); playClickSound();" id="btn-card4"
                class="tab-btn px-3 py-1.5 rounded-lg text-xs font-black font-mono border transition-all" style="background:rgba(3,10,25,0.8); border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5);">CARD 4: PREDICTION</button>
            <button onclick="switchCard('card5'); playClickSound();" id="btn-card5"
                class="tab-btn px-3 py-1.5 rounded-lg text-xs font-black font-mono border transition-all" style="background:rgba(3,10,25,0.8); border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5);">CARD 5: ဖန်ဇုန်</button>
        </div>
    </div>

    <!-- ===== MAIN CARD ===== -->
    <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:12px 0;">
        <div class="wc-premium-card" style="width:100%; max-width:880px; padding:24px 32px; display:flex; flex-direction:column; justify-content:space-between; min-height:400px; max-height:70vh;">

            <div id="segment-title" style="font-family:monospace; font-size:10px; letter-spacing:0.2em; color:rgba(201,162,39,0.75); font-weight:700; text-transform:uppercase; text-align:center; border-bottom:1px solid rgba(201,162,39,0.2); padding-bottom:12px;">
                LOADING DATA SUITE...
            </div>

            <div id="dynamic-content-box" style="flex:1; display:flex; align-items:center; justify-content:center; padding:10px 0; width:100%;"></div>

            <div id="screen-id" style="font-family:monospace; font-size:10px; letter-spacing:0.15em; color:rgba(78,205,150,0.3); font-weight:700; text-align:center; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05);">
                STREAM_SYS_ID: #STARTING
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <div style="display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.07); padding-top:10px; font-size:10px; font-family:monospace; color:rgba(255,255,255,0.25); letter-spacing:0.12em;">
        <div>48 MATCHES FULL SUITE ONLINE</div>
        <div>STADIUM OVERLAY CONFIG ENGINE v9.0</div>
    </div>

    <script>
        let rawFixtures = [];
        let matchesData = {};     // matches_data.json မှ ဆွဲထားသော manual data
        let currentMatchIndex = 0;
        let currentCardType = 'card1';
        let audioCtx = null;

        // ===== CLICK SOUND =====
        function playClickSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } catch (e) {}
        }

        // ===== FLAG MAP (ပြည့်စုံ) =====
        function getFlag(abbr) {
            const flags = {
                "MEX": "🇲🇽", "RSA": "🇿🇦", "KOR": "🇰🇷", "CZE": "🇨🇿", "CAN": "🇨🇦", "BIH": "🇧🇦",
                "USA": "🇺🇸", "PAR": "🇵🇾", "BRA": "🇧🇷", "MAR": "🇲🇦", "ENG": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "CRO": "🇭🇷",
                "ARG": "🇦🇷", "FRA": "🇫🇷", "GER": "🇩🇪", "ITA": "🇮🇹", "ESP": "🇪🇸", "POR": "🇵🇹",
                "NED": "🇳🇱", "BEL": "🇧🇪", "SEN": "🇸🇳", "JPN": "🇯🇵", "URU": "🇺🇾", "GHA": "🇬🇭",
                "QAT": "🇶🇦", "SUI": "🇨🇭", "HAI": "🇭🇹", "SCO": "🏴󠁧󠁢󠁳󠁣󠁴󠁿", "AUS": "🇦🇺", "TUR": "🇹🇷",
                "CUW": "🇨🇼", "ECU": "🇪🇨", "CIV": "🇨🇮", "SWE": "🇸🇪", "TUN": "🇹🇳", "CPV": "🇨🇻",
                "EGY": "🇪🇬", "KSA": "🇸🇦", "IRN": "🇮🇷", "NZL": "🇳🇿", "NOR": "🇳🇴", "ALG": "🇩🇿",
                "AUT": "🇦🇹", "JOR": "🇯🇴", "COD": "🇨🇩", "PAN": "🇵🇦", "UZB": "🇺🇿", "COL": "🇨🇴",
                "IRQ": "🇮🇶", "GBR": "🇬🇧", "WAL": "🏴󠁧󠁢󠁷󠁬󠁳󠁿"
            };
            return flags[abbr] || "🏳️";
        }

        // ===== FORMATION RENDERER =====
        // "4-3-3" → row arrays ပြန်ထုတ်ပေးသည်
        function parseFormation(formStr) {
            if (!formStr || formStr.trim() === '') return null;
            const parts = formStr.trim().split('-').map(Number);
            if (parts.some(isNaN) || parts.length < 2) return null;
            return parts;
        }

        // Position labels per row count
        function rowLabels(count, rowType) {
            const maps = {
                fwd: { 1: ['ST'], 2: ['LW','RW'], 3: ['LW','ST','RW'], 4: ['LW','CF','CF','RW'], 5: ['LW','IF','ST','IF','RW'] },
                mid: { 1: ['CM'], 2: ['CM','CM'], 3: ['CM','CM','CM'], 4: ['LM','CM','CM','RM'], 5: ['LM','CM','DM','CM','RM'], 6: ['LM','CM','CM','CM','CM','RM'] },
                def: { 2: ['LB','RB'], 3: ['LB','CB','RB'], 4: ['LB','CB','CB','RB'], 5: ['LWB','CB','CB','CB','RWB'] }
            };
            return (maps[rowType] && maps[rowType][count]) || Array(count).fill(rowType.toUpperCase().slice(0,2));
        }

        function buildPitchHTML(formation, teamName, abbr, isHome) {
            const rows = parseFormation(formation);
            const accentColor  = isHome ? 'rgba(110,231,183,0.95)' : 'rgba(147,197,253,0.95)';
            const accentBorder = isHome ? 'rgba(52,211,153,0.5)'   : 'rgba(96,165,250,0.5)';
            const accentGlow   = isHome ? 'rgba(52,211,153,0.25)'  : 'rgba(96,165,250,0.25)';

            const panelStyle = `background:rgba(3,10,25,0.52);border:1px solid ${accentBorder};border-radius:14px;padding:12px 10px;display:flex;flex-direction:column;justify-content:space-between;gap:7px;height:100%;box-shadow:0 0 22px ${accentGlow},inset 0 1px 0 rgba(255,255,255,0.05);`;

            const badge = (label, color, border) =>
                `<div style="display:inline-block;padding:3px 9px;border-radius:6px;border:1px solid ${border};background:rgba(0,0,0,0.4);font-family:monospace;font-size:11px;font-weight:800;color:${color};letter-spacing:0.04em;white-space:nowrap;">${label}</div>`;

            const rowDiv = (labels, color, border) =>
                `<div style="display:flex;justify-content:space-around;align-items:center;width:100%;">${labels.map(l=>badge(l,color,border)).join('')}</div>`;

            if (!rows) {
                return `<div style="${panelStyle}align-items:center;justify-content:center;">
                    <div style="font-family:monospace;font-size:12px;font-weight:800;color:${accentColor};text-align:center;margin-bottom:8px;">${getFlag(abbr)} ${teamName}</div>
                    <span class="not-set-badge">FORMATION NOT SET</span>
                </div>`;
            }

            const total = rows.length;
            let rowsHTML = '';
            rowsHTML += rowDiv(rowLabels(rows[total-1],'fwd'), 'rgba(251,191,36,0.95)', 'rgba(245,158,11,0.45)');
            for (let i = total-2; i >= 1; i--) {
                rowsHTML += rowDiv(rowLabels(rows[i],'mid'), 'rgba(255,255,255,0.82)', 'rgba(255,255,255,0.16)');
            }
            rowsHTML += rowDiv(rowLabels(rows[0],'def'), 'rgba(255,255,255,0.72)', 'rgba(255,255,255,0.13)');
            rowsHTML += `<div style="display:flex;justify-content:center;">${badge('🧤 GK', accentColor, accentBorder)}</div>`;

            return `<div style="${panelStyle}">
                <div style="text-align:center;font-family:monospace;font-size:12px;font-weight:800;color:${accentColor};letter-spacing:0.07em;border-bottom:1px solid ${accentBorder};padding-bottom:7px;">
                    ${getFlag(abbr)} ${teamName.toUpperCase()} <span style="color:rgba(251,191,36,0.8);margin-left:4px;">[${formation}]</span>
                </div>
                ${rowsHTML}
            </div>`;
        }

        // ===== LOAD BOTH JSON FILES =====
        async function loadFixturesData() {
            try {
                const [roundsRes, matchesRes] = await Promise.all([
                    fetch('rounds.json'),
                    fetch('matches_data.json')
                ]);

                const roundsData = await roundsRes.json();
                matchesData = await matchesRes.json();

                rawFixtures = [];
                roundsData.forEach(round => {
                    if (round.stage === "GROUP" && round.tournaments) {
                        round.tournaments.forEach(match => rawFixtures.push(match));
                    }
                });

                buildMatchDropdown();
                renderContent();
            } catch (error) {
                document.getElementById('segment-title').innerText = "ERROR: PLS CHECK JSON FILES";
                console.error(error);
            }
        }

        // ===== DROPDOWN =====
        function buildMatchDropdown() {
            const selector = document.getElementById('match-selector');
            selector.innerHTML = rawFixtures.map((m, idx) => {
                const mid = m.id;
                const hasData = matchesData[mid] && (
                    matchesData[mid].formation_home ||
                    matchesData[mid].win_home > 0 ||
                    matchesData[mid].pred_home_score > 0 ||
                    matchesData[mid].pred_away_score > 0
                );
                const dot = hasData ? '✅' : '⬜';
                return `<option value="${idx}">${dot} Match ${mid}: ${m.homeSquadName} vs ${m.awaySquadName}</option>`;
            }).join('');
        }

        function changeMatch(index) {
            currentMatchIndex = parseInt(index);
            renderContent();
        }

        function switchCard(cardType) {
            currentCardType = cardType;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.style.background = 'rgba(3,10,25,0.8)';
                btn.style.borderColor = 'rgba(255,255,255,0.12)';
                btn.style.color = 'rgba(255,255,255,0.5)';
                btn.style.boxShadow = 'none';
                btn.className = btn.className.replace('text-black','').trim();
            });
            const active = document.getElementById('btn-' + cardType);
            active.style.background = 'linear-gradient(135deg,#b8860b,#d4a017,#c9a227)';
            active.style.borderColor = '#d4a017';
            active.style.color = '#000';
            active.style.boxShadow = '0 0 14px rgba(201,162,39,0.5)';
            renderContent();
        }

        // ===== MAIN RENDER =====
        function renderContent() {
            if (rawFixtures.length === 0) return;

            const match = rawFixtures[currentMatchIndex];
            const contentBox = document.getElementById('dynamic-content-box');
            const segTitle = document.getElementById('segment-title');
            const scrId = document.getElementById('screen-id');

            // matches_data.json မှ manual data ဆွဲယူ (match.id နဲ့ key ချိတ်)
            const mid = String(match.id);
            const md = matchesData[mid] || {};

            const formationHome   = md.formation_home   || '';
            const formationAway   = md.formation_away   || '';
            const winHome         = md.win_home         || 0;
            const winDraw         = md.win_draw         || 0;
            const winAway         = md.win_away         || 0;
            const predHomeScore   = md.pred_home_score  !== undefined ? md.pred_home_score : null;
            const predAwayScore   = md.pred_away_score  !== undefined ? md.pred_away_score : null;
            const predComment     = md.pred_comment     || '';

            let dateObj = new Date(match.date);
            let formattedDate = "📅 " + dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

            // ========== CARD 1: MATCH PROFILE (auto from rounds.json) ==========
            if (currentCardType === 'card1') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // MATCH PROFILE";
                scrId.innerText = "OVERLAY_ID: #" + mid + "_PROFILE";
                contentBox.innerHTML = `
                    <div class="text-center space-y-6">
                        <div class="text-xl font-mono text-amber-400 font-bold tracking-widest bg-amber-500/10 border border-amber-500/20 px-6 py-1.5 rounded-full inline-block shadow-inner">${formattedDate}</div>
                        <div class="flex items-center justify-center gap-6 py-4">
                            <div class="text-4xl md:text-5xl font-black team-title tracking-wider text-white drop-shadow-md">${getFlag(match.homeSquadAbbr)} ${match.homeSquadName.toUpperCase()}</div>
                            <div class="text-amber-500 font-black text-4xl neon-gold px-4">VS</div>
                            <div class="text-4xl md:text-5xl font-black team-title tracking-wider text-white drop-shadow-md">${match.awaySquadName.toUpperCase()} ${getFlag(match.awaySquadAbbr)}</div>
                        </div>
                        <div class="text-sm font-mono text-emerald-400 font-semibold tracking-wider bg-emerald-950/40 border border-emerald-500/10 px-4 py-1.5 rounded-xl inline-block">
                            📍 ${match.venueName || 'Main Stadium'}, ${match.venueCity || 'Host City'}
                        </div>
                    </div>
                `;
            }

            // ========== CARD 2: FORMATION (manual from matches_data.json) ==========
            else if (currentCardType === 'card2') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // SQUAD FORMATION LAYOUT";
                scrId.innerText = "OVERLAY_ID: #" + mid + "_FORMATION";
                contentBox.innerHTML = `
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; height:42vh;">
                        ${buildPitchHTML(formationHome, match.homeSquadName, match.homeSquadAbbr, true)}
                        ${buildPitchHTML(formationAway, match.awaySquadName, match.awaySquadAbbr, false)}
                    </div>
                `;
            }

            // ========== CARD 3: WIN % (manual from matches_data.json) ==========
            else if (currentCardType === 'card3') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // WIN PROBABILITY ANALYTICS";
                scrId.innerText = "OVERLAY_ID: #" + mid + "_PROBABILITY";

                const totalSet = winHome + winDraw + winAway;
                const dataReady = totalSet > 0;

                if (!dataReady) {
                    contentBox.innerHTML = `
                        <div class="flex flex-col items-center justify-center gap-4 h-full">
                            <div class="text-5xl">📊</div>
                            <span class="not-set-badge text-base px-8 py-3">WIN % DATA NOT SET YET</span>
                            <p class="text-slate-500 font-mono text-xs">matches_data.json မှာ win_home / win_draw / win_away ဖြည့်ပါ</p>
                        </div>
                    `;
                } else {
                    contentBox.innerHTML = `
                        <div class="space-y-6 max-w-xl mx-auto w-full px-4">
                            <div>
                                <div class="flex justify-between text-sm font-mono font-black mb-1 text-emerald-400 tracking-wider">
                                    <span>${match.homeSquadName.toUpperCase()} WIN</span><span>${winHome}%</span>
                                </div>
                                <div class="w-full bg-slate-950 h-5 rounded-full p-1 border border-slate-800 shadow-inner">
                                    <div class="bg-gradient-to-r from-emerald-600 to-emerald-400 h-full rounded-full shadow-[0_0_15px_#10b981] transition-all duration-700" style="width: ${winHome}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm font-mono font-black mb-1 text-amber-400 tracking-wider">
                                    <span>DRAW PROBABILITY</span><span>${winDraw}%</span>
                                </div>
                                <div class="w-full bg-slate-950 h-5 rounded-full p-1 border border-slate-800 shadow-inner">
                                    <div class="bg-gradient-to-r from-amber-600 to-amber-400 h-full rounded-full shadow-[0_0_15px_#f59e0b] transition-all duration-700" style="width: ${winDraw}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm font-mono font-black mb-1 text-blue-400 tracking-wider">
                                    <span>${match.awaySquadName.toUpperCase()} WIN</span><span>${winAway}%</span>
                                </div>
                                <div class="w-full bg-slate-950 h-5 rounded-full p-1 border border-slate-800 shadow-inner">
                                    <div class="bg-gradient-to-r from-blue-600 to-blue-400 h-full rounded-full shadow-[0_0_15px_#3b82f6] transition-all duration-700" style="width: ${winAway}%"></div>
                                </div>
                            </div>
                            ${totalSet !== 100 ? `<p class="text-center text-red-400 font-mono text-xs">⚠️ စုစုပေါင်း ${totalSet}% — 100% ဖြစ်အောင် စစ်ပေးပါ</p>` : ''}
                        </div>
                    `;
                }
            }

            // ========== CARD 4: PREDICTION (manual from matches_data.json) ==========
            else if (currentCardType === 'card4') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // EXPERT FORECAST TIPS";
                scrId.innerText = "OVERLAY_ID: #" + mid + "_VERDICT";

                const scoreReady = predHomeScore !== null && predAwayScore !== null &&
                                   (predHomeScore > 0 || predAwayScore > 0 || predComment !== '');

                if (!scoreReady) {
                    contentBox.innerHTML = `
                        <div class="flex flex-col items-center justify-center gap-4 h-full">
                            <div class="text-5xl">🔮</div>
                            <span class="not-set-badge text-base px-8 py-3">PREDICTION NOT SET YET</span>
                            <p class="text-slate-500 font-mono text-xs">matches_data.json မှာ pred_home_score / pred_away_score / pred_comment ဖြည့်ပါ</p>
                        </div>
                    `;
                } else {
                    let decisionText = predComment;
                    if (!decisionText) {
                        if (predHomeScore > predAwayScore) {
                            decisionText = `${match.homeSquadName} ရဲ့ အောင်ပွဲကို မြင်တွေ့ရနိုင်ပါတယ်`;
                        } else if (predAwayScore > predHomeScore) {
                            decisionText = `${match.awaySquadName} ရဲ့ အောင်ပွဲကို မြင်တွေ့ရနိုင်ပါတယ်`;
                        } else {
                            decisionText = "ခြေရည်တူပြီး သရေကျဖို့ အလားအလာရှိပါတယ်";
                        }
                    }
                    contentBox.innerHTML = `
                        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:1.5rem;">

                            <!-- badge -->
                            <div style="
                                background: linear-gradient(90deg,#f59e0b,#fbbf24);
                                color:#000;
                                font-family:monospace;
                                font-weight:900;
                                font-size:0.7rem;
                                letter-spacing:0.18em;
                                padding:0.4rem 1.8rem;
                                border-radius:999px;
                                box-shadow:0 0 18px rgba(245,158,11,0.5);
                                text-transform:uppercase;
                            ">DOEPHAGYI'S CHOICE</div>

                            <!-- score row -->
                            <div style="display:flex; align-items:center; gap:1.5rem;">
                                <!-- home flag + name -->
                                <div style="text-align:right; min-width:140px;">
                                    <div style="font-size:2rem; line-height:1;">${getFlag(match.homeSquadAbbr)}</div>
                                    <div style="font-family:monospace; font-size:0.75rem; font-weight:800; color:#6ee7b7; letter-spacing:0.08em; margin-top:0.2rem;">${match.homeSquadName.toUpperCase()}</div>
                                </div>

                                <!-- score -->
                                <div style="
                                    font-family:'Impact','Arial Black',sans-serif;
                                    font-size:5.5rem;
                                    font-weight:900;
                                    color:#fff;
                                    text-shadow: 0 0 30px rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.8);
                                    letter-spacing:0.05em;
                                    line-height:1;
                                    white-space:nowrap;
                                ">${predHomeScore} <span style="color:#f59e0b; text-shadow:0 0 20px rgba(245,158,11,0.8);">-</span> ${predAwayScore}</div>

                                <!-- away flag + name -->
                                <div style="text-align:left; min-width:140px;">
                                    <div style="font-size:2rem; line-height:1;">${getFlag(match.awaySquadAbbr)}</div>
                                    <div style="font-family:monospace; font-size:0.75rem; font-weight:800; color:#93c5fd; letter-spacing:0.08em; margin-top:0.2rem;">${match.awaySquadName.toUpperCase()}</div>
                                </div>
                            </div>

                            <!-- divider -->
                            <div style="width:60%; height:1px; background:linear-gradient(90deg,transparent,rgba(245,158,11,0.4),transparent);"></div>

                            <!-- comment -->
                            <div style="
                                font-size:1.25rem;
                                font-weight:800;
                                color:#fbbf24;
                                text-shadow:0 0 15px rgba(245,158,11,0.7), 0 0 5px rgba(245,158,11,0.4);
                                text-align:center;
                                max-width:480px;
                                line-height:1.5;
                                letter-spacing:0.02em;
                            ">"${decisionText}"</div>

                        </div>
                    `;
                }
            }

            // ========== CARD 5: ဖန်ဇုန် (fixed, no data needed) ==========
            else if (currentCardType === 'card5') {
                segTitle.innerText = "FIFA WORLD CUP 2026 // AUDIENCE INTERACTION";
                scrId.innerText = "OVERLAY_ID: #" + mid + "_ENGAGEMENT";
                contentBox.innerHTML = `
                    <div class="text-center space-y-6 max-w-xl mx-auto">
                        <div class="text-amber-400 text-7xl neon-gold animate-bounce">⚽</div>
                        <div class="text-3xl md:text-4xl font-black tracking-wide text-white leading-tight">"သူငယ်ချင်းတို့ အမြင်ကရော ဗျာ?"</div>
                        <p class="text-lg text-emerald-400 font-semibold tracking-wide bg-emerald-950/40 border border-emerald-500/20 py-2 px-6 rounded-xl inline-block">
                            ဘယ်သူနိုင်မလဲ ကောမန့်မှာ တစ်ခါတည်း ရေးပေးခဲ့ဦးနော်!
                        </p>
                    </div>
                `;
            }
        }

        window.onload = loadFixturesData;
    </script>
</body>
</html>
